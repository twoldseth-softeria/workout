name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint
      run: npm run lint
    
    - name: Build
      run: npm run build
    
    - name: Download gg.cmd
      run: wget ggcmd.io/gg.cmd --no-check-certificate
        
    - name: Deploy prod
      env:
        RAT_SECRET: ${{ secrets.RAT_SECRET }}
      run: sh gg.cmd rat -v api upload -a 'workout5' -z dist
